<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>شطرنج هوشمند</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;align-items:center;width:100%;height:100%}
.scr{display:none;flex-direction:column;align-items:center;width:100%;height:100%}
.scr.on{display:flex}
#menuS{justify-content:center;overflow-y:auto}
#menuS h1{font-size:clamp(1.4rem,4.5vw,2.4rem);margin-bottom:4px;background:linear-gradient(90deg,#58a6ff,#f0883e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:clamp(.78rem,2vw,.95rem);color:#8b949e;margin-bottom:14px}
.mb{display:block;width:min(85%,320px);padding:11px 14px;margin:4px 0;border:1.5px solid #30363d;background:rgba(22,27,34,.8);color:#e6edf3;font-size:clamp(.82rem,2.2vw,.95rem);border-radius:10px;cursor:pointer;text-align:center}
.mb:hover{background:#21262d;border-color:#58a6ff}
.mb.g{border-color:#f0883e;color:#f0883e}
.dr{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:8px 0 14px}
.db{padding:5px 12px;border:1.5px solid #30363d;background:transparent;color:#8b949e;border-radius:8px;cursor:pointer;font-size:.8rem}
.db:hover,.db.on{border-color:#58a6ff;color:#58a6ff;background:rgba(88,166,255,.1)}

/* Game layout - strict height control */
#gameS{padding:2px 0;gap:0}
.gt-bar{display:flex;align-items:center;justify-content:center;gap:4px;width:100%;max-width:560px;padding:1px 4px;margin:2px 4px;height:24px;flex-shrink:0;overflow:hidden}
.gt-bar span{font-size:.65rem;color:#8b949e;white-space:nowrap;margin-left:3px}
.gt-bar button{padding:2px 5px;border:1px solid #30363d;background:rgba(22,27,34,.7);color:#dfdfdf;border-radius:4px;cursor:pointer;font-size:.65rem;white-space:nowrap;line-height:1}
.gt-bar button.on{background:rgba(88,166,255,.1);border-color:#58a6ff;color:#58a6ff}
.gt-bar button:hover:not(.on){border-color:#58a6ff;background:#30363d}
.bar{display:flex;justify-content:center;align-items:center;width:100%;padding:2px 4px;flex-wrap:nowrap;gap:3px;flex-shrink:0;height:28px;overflow:hidden}
.bar button{padding:3px 7px;border:1px solid #30363d;background:rgba(22,27,34,.9);color:#e6edf3;border-radius:4px;cursor:pointer;font-size:clamp(.6rem,1.5vw,.72rem);white-space:nowrap;line-height:1.2}
.bar button:hover{background:#30363d;border-color:#58a6ff}
.pi{display:flex;align-items:center;gap:5px;width:100%;max-width:560px;padding:2px 8px;background:rgba(22,27,34,.6);border:1px solid #21262d;border-radius:5px;margin:1px 4px;font-size:clamp(.65rem,1.5vw,.78rem);flex-shrink:0;height:24px;overflow:hidden}
.pi .cp{font-size:.68rem;letter-spacing:1px;opacity:.85;margin-right:auto;overflow:hidden;white-space:nowrap}
.pi.at{border-color:#58a6ff}
#sts{font-size:clamp(.68rem,1.7vw,.82rem);padding:1px 4px;text-align:center;color:#58a6ff;flex-shrink:0;height:20px;line-height:20px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;width:100%;max-width:560px}

/* Board - dynamically sized by JS */
#bwrap{display:flex;align-items:center;justify-content:center;flex-shrink:1;flex-grow:1;width:100%;min-height:0;padding:1px}
#brd{direction:ltr;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);border-radius:3px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.5);border:2px solid #555}
.sq{display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;user-select:none;line-height:1;overflow:hidden}
.sq::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;background:var(--bg-ov,transparent)}
.sq.l{background:#f0d9b5}.sq.d{background:#b58863}
.sq.lm{--bg-ov:rgba(255,255,51,0.5)}
.sq.sl{--bg-ov:rgba(106,174,106,0.8)}
.sq.ck{--bg-ov:rgba(220,50,50,0.8)}
.sq.hn{--bg-ov:rgba(88,166,255,0.6)}
.sq.dt::after{content:'';position:absolute;width:26%;height:26%;border-radius:50%;background:rgba(0,0,0,.22)}
.sq.rg::after{content:'';position:absolute;width:78%;height:78%;border-radius:50%;border:3px solid rgba(0,0,0,.22)}
.wpc,.bpc{display:flex;align-items:center;justify-content:center;width:100%;height:100%;pointer-events:none}
.wpc{color:#fff;text-shadow:0 1px 3px #000,0 0 5px rgba(0,0,0,.9)}
.bpc{color:#111;text-shadow:0 0 3px rgba(255,255,255,.3)}

/* Analysis panel */
.ap{width:100%;max-width:560px;flex-shrink:0;overflow-y:auto;background:rgba(13,17,23,.9);border:1px solid #21262d;border-radius:5px;margin:1px 4px;font-size:clamp(.62rem,1.4vw,.73rem)}
.ap:empty{display:none}
.ae{padding:3px 7px;border-bottom:1px solid #161b22;line-height:1.3;word-break:break-word}
.ae:last-child{border-bottom:none}
.tg{display:inline-block;padding:0 3px;border-radius:3px;font-size:.6rem;margin-left:2px;vertical-align:middle}
.tg.gr{background:rgba(63,185,80,.2);color:#3fb950}
.tg.gd{background:rgba(88,166,255,.2);color:#58a6ff}
.tg.ok{background:rgba(210,153,34,.2);color:#d29922}
.tg.bd{background:rgba(248,81,73,.2);color:#f85149}
.tg.bl{background:rgba(248,81,73,.4);color:#ff7b72}
.tg.ai{background:rgba(139,148,158,.15);color:#8b949e}
.ml{width:100%;max-width:560px;max-height:18px;overflow:hidden;font-size:.6rem;color:#484f58;padding:1px 6px;direction:ltr;text-align:left;flex-shrink:0;white-space:nowrap;text-overflow:ellipsis}
.ml:empty{display:none}

/* Review */
#revS{overflow-y:auto;padding:4px}
.rvbw{width:min(70vw,320px);aspect-ratio:1;margin:4px auto;flex-shrink:0}
.rvg{direction:ltr;display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);width:100%;height:100%;border-radius:3px;overflow:hidden;border:2px solid #555}
.rn{display:flex;gap:4px;margin:4px 0;align-items:center;justify-content:center;flex-shrink:0}
.rn button{padding:5px 12px;border:1px solid #30363d;background:#161b22;color:#e6edf3;border-radius:5px;cursor:pointer;font-size:.85rem}
.rn button:hover{background:#21262d;border-color:#58a6ff}
.ri{width:min(94%,520px);background:rgba(22,27,34,.8);border:1px solid #21262d;border-radius:6px;padding:7px 10px;margin:3px auto;font-size:clamp(.7rem,1.5vw,.8rem);line-height:1.4;max-height:100px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.rm{display:flex;flex-wrap:wrap;gap:2px;width:min(94%,520px);margin:3px auto;max-height:36px;overflow-y:auto;direction:ltr}
.rm span{padding:1px 5px;border-radius:3px;font-size:.66rem;cursor:pointer;background:#161b22;border:1px solid #21262d;color:#8b949e}
.rm span:hover{border-color:#58a6ff;color:#58a6ff}
.rm span.cu{background:#58a6ff;color:#fff}
.sb{width:min(94%,520px);background:rgba(22,27,34,.9);border:1px solid #30363d;border-radius:8px;padding:8px;margin:4px auto;line-height:1.4;font-size:clamp(.7rem,1.5vw,.8rem)}
.sb h3{color:#58a6ff;margin-bottom:4px;font-size:.85rem}

/* Learn */
#learnS{overflow-y:auto;padding:4px}
.lc{width:min(94%,600px);padding:10px;line-height:1.6;font-size:clamp(.8rem,2vw,.92rem)}
.lc h2{color:#58a6ff;margin:12px 0 6px;font-size:clamp(.95rem,2.5vw,1.2rem)}
.lc h3{color:#f0883e;margin:8px 0 4px}
.ln{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin:6px 0}
.ln button{padding:4px 9px;border:1px solid #30363d;background:#161b22;color:#8b949e;border-radius:5px;cursor:pointer;font-size:.72rem}
.ln button:hover,.ln button.on{background:rgba(88,166,255,.1);border-color:#58a6ff;color:#58a6ff}

#pmod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#pmod .pm{background:#161b22;border:2px solid #58a6ff;border-radius:12px;padding:14px;text-align:center}
#pmod .pc{display:flex;gap:6px;justify-content:center;margin-top:8px}
#pmod .pc span{font-size:2rem;cursor:pointer;padding:6px;border-radius:8px}
#pmod .pc span:hover{background:rgba(88,166,255,.2)}
.pu{animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.mwi{display:flex;gap:4px;width:100%;max-width:560px;padding:2px 8px;background:rgba(22,27,34,.6);border:1px solid #21262d;border-radius:5px;margin:1px 4px;font-size:clamp(.65rem,1.5vw,.78rem);flex-shrink:0;height:28px;align-items:center}
.mwi input{flex:1;background:transparent;border:none;color:#e6edf3;font-size:clamp(.65rem,1.5vw,.78rem);outline:none;font-family:inherit;direction:rtl}
.mwi button{padding:2px 10px;border:1px solid #30363d;background:rgba(35,134,54,.95);color:#fff;border-radius:4px;cursor:pointer;font-size:clamp(.62rem,1.5vw,.74rem);font-weight:bold;line-height:1.2;white-space:nowrap}
.mwi button:hover{background:#2ea44f}
.mwe{color:#ff7b72;font-size:.65rem;text-align:right;width:100%;max-width:560px;margin:0 4px;display:none;flex-shrink:0;height:14px;line-height:14px;overflow:hidden}
.mem-btn:hover{filter:brightness(1.25)}
.mem-btn:active{transform:scale(0.96)}
</style>

                if(rm.fr===best.fr&&rm.fc===best.fc&&rm.tr===best.tr&&rm.tc===best.tc){
                  fd=rm;
                  break;
                }
              }
            }
            if(!fd&&rms2.length>0)fd=rms2[0];
            best=fd;
            applyAiMove(best,aiC,false);
            if (res && res.depth !== undefined && !ov) {
              var evalVal = res.s;
              if (aiC === 'b') {
                evalVal = -evalVal;
              }
              var evalText = (evalVal / 100).toFixed(2);
              var depthText = "🎯 نوبت شما | 🧠 AI: عمق " + res.depth + "، ارزیابی: " + evalText + " (" + (res.elapsed / 1000).toFixed(2) + " ثانیه)" + (ponderHit ? " [حدس درست ⚡]" : "");
              document.getElementById('sts').textContent = depthText;
            }
          }
        };
        worker.postMessage({
          type:'minimax',
          id:curWorkerMvId,
          bd:cln(bd),
          d:d2,
          al:-1e9,
          bt:1e9,
          mx:mx,
          c2:{wk:cas.wk,wq:cas.wq,bk:cas.bk,bq:cas.bq},
          eps:epq,
          timeLimit:timeLimit,
          clearTT: !ponderHit,
          gameHashes: GR.map(function(g) {
            return getHashMT(g.bd, g.tn === 'w', g.cas, g.ep);
          })
        });
      }
    } catch(e) {
      console.error(e);
      aOn=false;
      sel=E;pms=[];
      ren();
      upSt();
    }
  },60);
}

function startPondering() {
  if (ov || tn !== PC || aOn || !lastAiPonderMove) return;
  
  // Verify that lastAiPonderMove is a legal move
  var legMvs = aLeg(bd, tn, cas, epq);
  var validMove = null;
  for (var i = 0; i < legMvs.length; i++) {
    var m = legMvs[i];
    if (m.fr === lastAiPonderMove.fr && m.fc === lastAiPonderMove.fc && m.tr === lastAiPonderMove.tr && m.tc === lastAiPonderMove.tc) {
      validMove = m;
      break;
    }
  }
  
  if (!validMove) return;
  
  // Apply validMove to get the pondered board state
  var pBd = cln(bd);
  appM(pBd, validMove);
  var pCas = {wk: cas.wk, wq: cas.wq, bk: cas.bk, bq: cas.bq};
  uCRc(pCas, validMove);
  var pEpq = validMove.epc || E;
  
  var aiC = PC === 'w' ? 'b' : 'w';
  var mx = aiC === 'w';
  
  isPondering = true;
  ponderMoveApplied = validMove;
  
  var d2 = [3, 4, 6, 8][Math.min(df-1, 3)];
  var timeLimit = 30000; // 30 seconds of background pondering
  
  if (aiWorkerSearching) {
    terminateWorker();
  }
  
  var worker = getWorker();
  var curWorkerMvId = Date.now();
  aiWorkerSearching = true;
  
  if (document.getElementById('sts')) {
    var originalSts = document.getElementById('sts').textContent;
    if (!originalSts.includes('🧠')) {
      document.getElementById('sts').textContent = originalSts + ' | 🧠 AI در حال پیش‌بینی حرکت شما...';
    }
  }
  
  worker.onmessage = function(e) {
    if (e.data.type === 'result' && e.data.id === curWorkerMvId) {
      aiWorkerSearching = false;
      // Pondering completed. Transposition Table (TT) is fully loaded!
    }
  };
  
  worker.postMessage({
    type: 'minimax',
    id: curWorkerMvId,
    bd: pBd,
    d: d2 + 1, // Search 1 depth deeper during pondering
    al: -1e9,
    bt: 1e9,
    mx: mx,
    c2: pCas,
    eps: pEpq,
    timeLimit: timeLimit,
    clearTT: false, // DO NOT clear transposition table!
    gameHashes: GR.map(function(g) {
      return getHashMT(g.bd, g.tn === 'w', g.cas, g.ep);
    })
  });
}

function bSum(){var el=document.getElementById('rvs');var pM=GR.filter(function(g){return g.ip&&g.ac>=0});if(!pM.length){el.innerHTML='<h3>خلاصه</h3><p>داده کافی نیست</p>';return}var avg=Math.round(pM.reduce(function(s,g){return s+g.ac},0)/pM.length);var best=pM[0],worst=pM[0];pM.forEach(function(g){if(g.ac>best.ac)best=g;if(g.ac<worst.ac)worst=g});var h='<h3>📊 خلاصه</h3><p>دقت: <b>'+avg+'%</b> | حرکات: '+pM.length+'</p>';if(oNm)h+='<p>📖'+oNm+'</p>';h+='<p>بهترین: '+best.nt+'('+best.ac+'%) | ضعیف‌ترین: '+worst.nt+'('+worst.ac+'%)</p>';el.innerHTML=h}
function contHere(){terminateWorker();if(rvI<0||rvI>=GR.length)return;var g=GR[rvI];bd=cln(g.bd);tn=g.tn;cas={wk:g.cas.wk,wq:g.cas.wq,bk:g.cas.bk,bq:g.cas.bq};epq=g.ep;cW=g.cW.slice();cB=g.cB.slice();lmv=g.mv;ov=false;sel=E;pms=[];aOn=false;GR=GR.slice(0,rvI+1);hs=[];mn=rvI;document.getElementById('ml').textContent=GR.slice(1).map(function(x,i){var num=Math.ceil((i+1)/2);return((i+1)%2===1?num+'.':'')+x.nt}).join(' ');document.getElementById('ap').innerHTML='';show('gameS');ren();upSt();if(!ov&&tn!==PC)setTimeout(aiTn,200)}
